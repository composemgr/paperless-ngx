# nginx proxy address - http://172.17.0.1:8000

name: paperless-ngx
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "1"

services:
  paperless-ngx:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    pull_policy: always
    container_name: paperless-ngx-app
    restart: always
    logging: *default-logging
    networks:
      - paperless-ngx
      - proxy
      - cloudflare
    ports:
      - "172.17.0.1:8000:8000"
    environment:
      TZ: ${TZ:-America/New_York}
      PAPERLESS_REDIS: redis://paperless-ngx-redis:6379
      PAPERLESS_DBHOST: paperless-ngx-db
      PAPERLESS_DBNAME: ${DB_CREATE_DATABASE_NAME:-paperless}
      PAPERLESS_DBUSER: ${DB_USER_NAME:-paperless}
      PAPERLESS_DBPASS: ${DB_USER_PASS:-changeme_db_password}
      PAPERLESS_SECRET_KEY: ${APP_SECRET_KEY:-changeme_secret_key}
      PAPERLESS_URL: https://${BASE_DOMAIN_NAME:-${BASE_HOST_NAME:-localhost}}
      PAPERLESS_ADMIN_USER: ${APP_ADMIN_USER:-admin}
      PAPERLESS_ADMIN_PASSWORD: ${APP_ADMIN_PASS:-changeme_admin_password}
      PAPERLESS_ADMIN_MAIL: ${APP_ADMIN_USER:-admin}@${BASE_DOMAIN_NAME:-${BASE_HOST_NAME:-localhost}}
      PAPERLESS_OCR_LANGUAGE: eng
      PAPERLESS_TIME_ZONE: ${TZ:-America/New_York}
      PAPERLESS_EMAIL_HOST: ${EMAIL_SERVER_HOST:-172.17.0.1}
      PAPERLESS_EMAIL_PORT: ${EMAIL_SERVER_PORT:-587}
      PAPERLESS_EMAIL_HOST_USER: ${EMAIL_SERVER_LOGIN_NAME:-}
      PAPERLESS_EMAIL_HOST_PASSWORD: ${EMAIL_SERVER_LOGIN_PASS:-}
      PAPERLESS_EMAIL_FROM: paperless-ngx@${BASE_DOMAIN_NAME:-${BASE_HOST_NAME:-localhost}}
      PAPERLESS_EMAIL_USE_TLS: "true"
      CONTAINER_NAME: paperless-ngx-app
      HOSTNAME: ${BASE_HOST_NAME:-$HOSTNAME}
    volumes:
      - ./volumes/data/paperless-ngx:/usr/src/paperless/data
      - ./volumes/data/media/documents:/usr/src/paperless/media
      - ./volumes/data/export:/usr/src/paperless/export
      - ./volumes/data/consume:/usr/src/paperless/consume
    depends_on:
      - paperless-ngx-db
      - paperless-ngx-redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - 'traefik.enable=true'
      - 'cloudflare.enable=true'
      - 'traefik.docker.network=proxy'
      - 'cloudflare.service=http://paperless-ngx-app:8000'
      - 'cloudflare.hostname=paperless-ngx.${CLOUDFLARE_ZONE_NAME:-}'
      - 'traefik.http.routers.paperless-ngx-app.entrypoints=http'
      - 'traefik.http.routers.paperless-ngx-app-secure.tls=true'
      - 'traefik.http.routers.paperless-ngx-app.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.middlewares.paperless-ngx-app-https-redirect.redirectscheme.scheme=https'
      - 'traefik.http.routers.paperless-ngx-app.middlewares=paperless-ngx-app-https-redirect'
      - 'traefik.http.routers.paperless-ngx-app-secure.entrypoints=https'
      - 'traefik.http.routers.paperless-ngx-app-secure.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.routers.paperless-ngx-app-secure.tls.certresolver=cloudflare'
      - 'traefik.http.routers.paperless-ngx-app-secure.service=paperless-ngx-app'
      - 'traefik.http.services.paperless-ngx-app.loadbalancer.server.port=8000'

  paperless-ngx-db:
    image: postgres:latest
    pull_policy: always
    container_name: paperless-ngx-db
    restart: always
    logging: *default-logging
    networks:
      - paperless-ngx
    environment:
      TZ: ${TZ:-America/New_York}
      POSTGRES_DB: ${DB_CREATE_DATABASE_NAME:-paperless}
      POSTGRES_USER: ${DB_USER_NAME:-paperless}
      POSTGRES_PASSWORD: ${DB_USER_PASS:-changeme_db_password}
      CONTAINER_NAME: paperless-ngx-db
    volumes:
      - ./volumes/data/db/postgres/paperless-ngx:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 3

  paperless-ngx-redis:
    image: redis:alpine
    pull_policy: always
    container_name: paperless-ngx-redis
    restart: always
    logging: *default-logging
    networks:
      - paperless-ngx
    environment:
      TZ: ${TZ:-America/New_York}
      CONTAINER_NAME: paperless-ngx-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  paperless-ngx:
    external: false
  proxy:
    external: true
  cloudflare:
    external: true
